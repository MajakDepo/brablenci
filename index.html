<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Mravenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
        }

        #board { margin-top: 20px; }

        .hex-row {
            display: flex;
            margin-bottom: -15px;
        }

        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        .hex.nest {
            background-color: #5d4037;
            border: 2px solid #f1c40f;
        }
        .hex.nest::after {
            content: "VCHOD";
            font-size: 10px;
            position: absolute;
            top: 70%;
            left: 20%;
            color: #f1c40f;
            pointer-events: none;
        }

        /* Modrá barva pro vybraného mravence */
        .hex.selected { background-color: #3498db; transform: scale(1.1); }

        .ant {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #d35400; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        <p><strong>Feromonové body:</strong> <span id="fb-count">0</span></p>
        <hr>
        <h3>Podzemní Sklad</h3>
        <p>Bio (Jídlo): <span id="bio-count">0</span></p>
        <p>Materiál: <span id="mat-count">0</span></p>
        <hr>
        <h3>Akce</h3>
        <button id="btn-hatch" onclick="hatchAnt()">Vylíhnout Vojáka (1 Bio)</button>
        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db;">Ukončit tah (+5 FB)</button>
        <p id="message" style="color: #e74c3c; font-weight: bold; min-height: 20px;"></p>
    </div>

    <script>
        // DATA HRY
        let gameState = {
            bio: 10,
            material: 10,
            feromons: 5,
            nestLocation: { r: 5, c: 0 }
        };

        let selectedHex = null; // Pamatuje si, na jaké políčko jsi klikl

        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        // AKTUALIZACE PANELU A HLÁŠEK
        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            
            // Tlačítko se vypne, pokud není dost FB nebo Bio
            document.getElementById('btn-hatch').disabled = (gameState.bio < 1 || gameState.feromons < 1);
        }

        function showMessage(text) {
            const msgObj = document.getElementById('message');
            msgObj.innerText = text;
            setTimeout(() => { msgObj.innerText = ""; }, 2500); // Hláška po 2.5 vteřinách zmizí
        }

        // KONTROLA SOUSEDSTVÍ (Matematika hexové sítě)
        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            
            // Pohyb doleva a doprava ve stejném řádku
            if (dr === 0 && dc === 1) return true; 

            // Pohyb nahoru nebo dolů závisí na tom, zda je řádek odsazený (sudé/liché pravidlo CSS)
            if (dr === 1) {
                const isShifted = (r1 % 2 !== 0); // V našem CSS jsou liché indexy (1,3,5) posunuté doprava
                if (isShifted) {
                    if (c2 === c1 || c2 === c1 + 1) return true;
                } else {
                    if (c2 === c1 || c2 === c1 - 1) return true;
                }
            }
            return false;
        }

        // GENEROVÁNÍ MAPY A LOGIKA KLIKÁNÍ
        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';

                for (let c = 0; c < columns; c++) {
                    const hexElement = document.createElement('div');
                    hexElement.className = 'hex';
                    hexElement.id = `hex-${r}-${c}`;
                    hexElement.dataset.row = r;
                    hexElement.dataset.col = c;
                    
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) {
                        hexElement.classList.add('nest');
                    }

                    // CO SE STANE PO KLIKNUTÍ
                    hexElement.addEventListener('click', function() {
                        const clickedRow = parseInt(this.dataset.row);
                        const clickedCol = parseInt(this.dataset.col);
                        const hasAnt = this.querySelector('.ant') !== null;

                        // 1. MÁME UŽ NĚCO VYBRÁNO?
                        if (selectedHex) {
                            if (this === selectedHex) {
                                // Klikli jsme na stejné políčko -> Zrušit výběr
                                this.classList.remove('selected');
                                selectedHex = null;
                            } else if (hasAnt) {
                                // Klikli jsme na jiného mravence -> Vybrat jeho
                                selectedHex.classList.remove('selected');
                                this.classList.add('selected');
                                selectedHex = this;
                            } else {
                                // Klikli jsme na prázdné políčko -> Zkusit pohyb
                                if (gameState.feromons >= 1) {
                                    const sr = parseInt(selectedHex.dataset.row);
                                    const sc = parseInt(selectedHex.dataset.col);
                                    
                                    if (isAdjacent(sr, sc, clickedRow, clickedCol)) {
                                        // Přesun mravence
                                        this.innerHTML = '<div class="ant">🐜</div>';
                                        selectedHex.innerHTML = '';
                                        
                                        // Dokončení přesunu
                                        selectedHex.classList.remove('selected');
                                        selectedHex = null;
                                        gameState.feromons -= 1;
                                        updateUI();
                                    } else {
                                        showMessage("Mravenec tam nedojde (moc daleko)!");
                                    }
                                } else {
                                    showMessage("Nemáš Feromonové body na pohyb!");
                                    selectedHex.classList.remove('selected');
                                    selectedHex = null;
                                }
                            }
                        } else {
                            // 2. ZATÍM NEMÁME NIC VYBRÁNO
                            if (hasAnt) {
                                // Vybereme mravence
                                this.classList.add('selected');
                                selectedHex = this;
                            }
                        }
                    });

                    rowElement.appendChild(hexElement);
                }
                boardElement.appendChild(rowElement);
            }
        }

        // LOGIKA LÍHNUTÍ
        function hatchAnt() {
            const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
            
            // Kontrola, zda na vchodu už někdo nestojí
            if (nestHex.querySelector('.ant') !== null) {
                showMessage("Vchod do hnízda je zablokovaný!");
                return;
            }

            if (gameState.bio >= 1 && gameState.feromons >= 1) {
                nestHex.innerHTML = '<div class="ant">🐜</div>';
                gameState.bio -= 1;
                gameState.feromons -= 1;
                updateUI();
            }
        }

        // KONEC TAHU
        function nextTurn() {
            gameState.feromons += 5;
            updateUI();
        }

        createBoard();
        updateUI();
    </script>

</body>
</html>
