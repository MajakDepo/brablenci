<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Brablenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
        }

        #board { margin-top: 20px; }

        .hex-row {
            display: flex;
            margin-bottom: -15px;
        }

        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        /* VCHOD DO HNÍZDA */
        .hex.nest {
            background-color: #5d4037; /* Tmavší hnědá pro vchod */
            border: 2px solid #f1c40f;
        }
        .hex.nest::after {
            content: "VCHOD";
            font-size: 10px;
            position: absolute;
            top: 70%;
            left: 20%;
            color: #f1c40f;
        }

        .hex.selected { background-color: #2ecc71; }

        .ant {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:disabled {
            background-color: #7f8c8d;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) { background-color: #d35400; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        <p><strong>Feromonové body:</strong> <span id="fb-count">0</span></p>
        <hr>
        <h3>Podzemní Sklad</h3>
        <p>Bio (Jídlo): <span id="bio-count">0</span></p>
        <p>Materiál: <span id="mat-count">0</span></p>
        <hr>
        <h3>Akce</h3>
        <button id="btn-hatch" onclick="hatchAnt()">Vylíhnout Vojáka (1 Bio)</button>
        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db;">Ukončit tah (+5 FB)</button>
        <p id="message" style="color: #e74c3c; font-weight: bold;"></p>
    </div>

    <script>
        // DATA HRY
        let gameState = {
            bio: 10,
            material: 10,
            feromons: 5,
            nestLocation: { r: 5, c: 0 } // Kde se mravenci líhnou
        };

        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        // AKTUALIZACE PANELU
        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            document.getElementById('message').innerText = "";

            // Deaktivovat tlačítko, pokud není dost FB nebo Bio
            document.getElementById('btn-hatch').disabled = (gameState.bio < 1 || gameState.feromons < 1);
        }

        // GENEROVÁNÍ MAPY
        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';

                for (let c = 0; c < columns; c++) {
                    const hexElement = document.createElement('div');
                    hexElement.className = 'hex';
                    hexElement.id = `hex-${r}-${c}`;
                    
                    // Označení vchodu do hnízda
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) {
                        hexElement.classList.add('nest');
                    }

                    hexElement.addEventListener('click', function() {
                        const allHexes = document.querySelectorAll('.hex');
                        allHexes.forEach(h => h.classList.remove('selected'));
                        this.classList.add('selected');
                    });

                    rowElement.appendChild(hexElement);
                }
                boardElement.appendChild(rowElement);
            }
        }

        // LOGIKA LÍHNUTÍ
        function hatchAnt() {
            if (gameState.bio >= 1 && gameState.feromons >= 1) {
                // Najdeme políčko vchodu
                const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
                
                // Přidáme mravence (můžeme jich tam mít i víc, pro zjednodušení teď jen emoji)
                nestHex.innerHTML = '<div class="ant">🐜</div>';

                // Odečteme zdroje
                gameState.bio -= 1;
                gameState.feromons -= 1;
                
                updateUI();
            } else {
                document.getElementById('message').innerText = "Nedostatek zdrojů nebo FB!";
            }
        }

        // KONEC TAHU (pro testování)
        function nextTurn() {
            gameState.feromons += 5;
            updateUI();
        }

        // Inicializace
        createBoard();
        updateUI();
    </script>

</body>
</html>
