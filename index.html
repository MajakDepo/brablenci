<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Mravenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
            max-width: 350px;
        }

        #board { margin-top: 20px; }

        .hex-row {
            display: flex;
            margin-bottom: -15px;
        }

        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        .hex.nest { background-color: #5d4037; border: 2px solid #f1c40f; }
        .hex.enemy-nest { background-color: #c0392b; border: 2px solid #000; }
        .hex.rock { background-color: #7f8c8d; cursor: not-allowed; }
        .hex.rock::after { content: "🪨"; font-size: 30px; position: absolute; top: 15%; left: 15%; pointer-events: none; }

        .hex.selected { background-color: #3498db; transform: scale(1.1); }

        .ant, .worker, .elite, .enemy, .resource {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        .enemy { background-color: rgba(231, 76, 60, 0.4); border-radius: 50%; }

        h3 { border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; margin-top: 20px; }
        
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            margin: 3px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 13px;
        }

        button:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.6; }
        button:hover:not(:disabled) { background-color: #d35400; }

        .stats-box { background: #2c3e50; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        
        <div class="stats-box">
            <strong>Feromonové body:</strong> <span id="fb-count">0</span><br>
            <strong>Bio (Jídlo):</strong> <span id="bio-count">0</span><br>
            <strong>Materiál:</strong> <span id="mat-count">0</span>
        </div>

        <h3>Podzemní stavba</h3>
        <button id="btn-build-hatchery" onclick="buildHatchery()">Postavit Líheň 2 (10 Mat)</button>

        <h3>Líhnutí mravenců</h3>
        <button id="btn-hatch-basic" onclick="hatchUnit('basic')">Základní voják 🐜 (1 Bio)</button>
        <button id="btn-hatch-worker" onclick="hatchUnit('worker')">Dělník 👷 (1 Bio)</button>
        <button id="btn-hatch-elite" onclick="hatchUnit('elite')" disabled>Elitní voják 🦂 (3 Bio)</button>

        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db; margin-top: 20px;">Ukončit tah (+5 FB)</button>
        
        <p id="message" style="color: #2ecc71; font-weight: bold; min-height: 50px; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <script>
        let gameState = {
            bio: 5,
            material: 5,
            feromons: 10,
            hatcheryLvl: 1,
            nestLocation: { r: 5, c: 0 },
            enemyNestLocation: { r: 2, c: 10 },
            rocksAmount: 12
        };

        let selectedHex = null;
        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            
            // Logika tlačítek
            document.getElementById('btn-build-hatchery').disabled = (gameState.material < 10 || gameState.hatcheryLvl >= 2);
            if(gameState.hatcheryLvl >= 2) document.getElementById('btn-build-hatchery').innerText = "Líheň 2 postavená ✅";
            
            document.getElementById('btn-hatch-basic').disabled = (gameState.bio < 1 || gameState.feromons < 1);
            document.getElementById('btn-hatch-worker').disabled = (gameState.bio < 1 || gameState.feromons < 1);
            document.getElementById('btn-hatch-elite').disabled = (gameState.bio < 3 || gameState.feromons < 1 || gameState.hatcheryLvl < 2);
        }

        function showMessage(text, color = "#2ecc71") {
            const msgObj = document.getElementById('message');
            msgObj.innerHTML = text;
            msgObj.style.color = color;
            setTimeout(() => { msgObj.innerHTML = ""; }, 4000);
        }

        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            if (dr === 0 && dc === 1) return true; 
            if (dr === 1) {
                const isShifted = (r1 % 2 !== 0);
                if (isShifted) { if (c2 === c1 || c2 === c1 + 1) return true; }
                else { if (c2 === c1 || c2 === c1 - 1) return true; }
            }
            return false;
        }

        function getDistance(r1, c1, r2, c2) { return Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(c1 - c2, 2)); }

        function buildHatchery() {
            if (gameState.material >= 10) {
                gameState.material -= 10;
                gameState.hatcheryLvl = 2;
                showMessage("Líheň 2 postavená! Můžeš líhnout elitní vojáky 🦂", "#f1c40f");
                updateUI();
            }
        }

        function hatchUnit(type) {
            const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
            if (nestHex.innerHTML !== '') {
                showMessage("Vchod je zablokovaný!", "#e74c3c");
                return;
            }

            let cost = (type === 'elite') ? 3 : 1;
            if (gameState.bio >= cost && gameState.feromons >= 1) {
                let icon = '🐜';
                let className = 'ant';
                if(type === 'worker') { icon = '👷'; className = 'worker'; }
                if(type === 'elite') { icon = '🦂'; className = 'elite'; }

                nestHex.innerHTML = `<div class="${className}">${icon}</div>`;
                gameState.bio -= cost;
                gameState.feromons -= 1;
                updateUI();
            }
        }

        // --- POMOCNÉ FUNKCE PRO HRU ---
        function spawnRocks() {
            let spawned = 0;
            while (spawned < gameState.rocksAmount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                if (hex && getDistance(r, c, gameState.nestLocation.r, gameState.nestLocation.c) > 1.5 && getDistance(r, c, gameState.enemyNestLocation.r, gameState.enemyNestLocation.c) > 1.5 && hex.innerHTML === '' && !hex.classList.contains('rock')) {
                    hex.classList.add('rock');
                    spawned++;
                }
            }
        }

        function spawnResources(amount) {
            let spawned = 0;
            while (spawned < amount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                if (hex && !hex.classList.contains('nest') && !hex.classList.contains('enemy-nest') && !hex.classList.contains('rock') && hex.innerHTML === '') {
                    hex.innerHTML = '<div class="resource">🌱</div>';
                    spawned++;
                }
            }
        }

        function spawnEnemy() {
            const r = gameState.enemyNestLocation.r;
            const c = gameState.enemyNestLocation.c;
            const nest = document.getElementById(`hex-${r}-${c}`);
            if (nest.innerHTML === '') nest.innerHTML = '<div class="enemy">🐜</div>';
            else {
                for(let dr=-1; dr<=1; dr++) {
                    for(let dc=-1; dc<=1; dc++) {
                        const nr = r+dr, nc = c+dc;
                        if(nr>=0 && nr<rows && nc>=0 && nc<columns && isAdjacent(r,c,nr,nc)) {
                            const h = document.getElementById(`hex-${nr}-${nc}`);
                            if(h && h.innerHTML === '' && !h.classList.contains('rock')) {
                                h.innerHTML = '<div class="enemy">🐜</div>'; return;
                            }
                        }
                    }
                }
            }
        }

        function countAlliesAround(row, col) {
            let allies = 0;
            document.querySelectorAll('.hex').forEach(hex => {
                if (hex.querySelector('.ant') || hex.querySelector('.worker') || hex.querySelector('.elite')) {
                    if (isAdjacent(row, col, parseInt(hex.dataset.row), parseInt(hex.dataset.col))) allies++;
                }
            });
            return allies;
        }

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';
                for (let c = 0; c < columns; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hex'; hex.id = `hex-${r}-${c}`;
                    hex.dataset.row = r; hex.dataset.col = c;
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) hex.classList.add('nest');
                    if (r === gameState.enemyNestLocation.r && c === gameState.enemyNestLocation.c) hex.classList.add('enemy-nest');

                    hex.addEventListener('click', function() {
                        const r = parseInt(this.dataset.row), c = parseInt(this.dataset.col);
                        const myUnit = this.querySelector('.ant, .worker, .elite');
                        const enemy = this.querySelector('.enemy');
                        const resource = this.querySelector('.resource');

                        if (selectedHex) {
                            if (this === selectedHex) { this.classList.remove('selected'); selectedHex = null; }
                            else if (myUnit) { selectedHex.classList.remove('selected'); this.classList.add('selected'); selectedHex = this; }
                            else if (isAdjacent(parseInt(selectedHex.dataset.row), parseInt(selectedHex.dataset.col), r, c) && !this.classList.contains('rock')) {
                                if (gameState.feromons < 1) { showMessage("Nemáš FB!", "#e74c3c"); return; }
                                
                                const type = selectedHex.children[0].className;
                                
                                if (enemy) {
                                    if(type === 'worker') { showMessage("Dělník neumí bojovat a byl sežrán!", "#e74c3c"); selectedHex.innerHTML = ''; }
                                    else {
                                        let roll = Math.floor(Math.random() * 6) + 1;
                                        let bonus = countAlliesAround(r, c) - 1;
                                        if (type === 'elite') bonus += 1; // Elitní bonus
                                        let total = roll + bonus;
                                        
                                        if (total >= 4) {
                                            gameState.bio += 1; gameState.material += 1; // Kořist z nepřítele
                                            showMessage(`Boj: Hod ${roll} + bonus ${bonus} = ${total}. Vítězství! (+1 Bio, +1 Mat)`, "#f1c40f");
                                            this.innerHTML = selectedHex.innerHTML; selectedHex.innerHTML = '';
                                        } else {
                                            showMessage(`Boj: Hod ${roll} + bonus ${bonus} = ${total}. Prohra!`, "#e74c3c");
                                            selectedHex.innerHTML = '';
                                        }
                                    }
                                } else {
                                    if (resource) {
                                        let gain = (type === 'worker') ? 3 : 2;
                                        gameState.bio += gain;
                                        showMessage(`Získáno +${gain} Bio!`, "#2ecc71");
                                    }
                                    this.innerHTML = selectedHex.innerHTML; selectedHex.innerHTML = '';
                                }
                                selectedHex.classList.remove('selected'); selectedHex = null;
                                gameState.feromons -= 1; updateUI();
                            }
                        } else if (myUnit) { this.classList.add('selected'); selectedHex = this; }
                    });
                    rowElement.appendChild(hex);
                }
                boardElement.appendChild(rowElement);
            }
        }

        function moveEnemies() {
            document.querySelectorAll('.hex').forEach(hex => {
                if (hex.querySelector('.enemy')) {
                    const r = parseInt(hex.dataset.row), c = parseInt(hex.dataset.col);
                    let best = null, minDist = 999;
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            const nr=r+dr, nc=c+dc;
                            if(nr>=0 && nr<rows && nc>=0 && nc<columns && isAdjacent(r,c,nr,nc)) {
                                const target = document.getElementById(`hex-${nr}-${nc}`);
                                if(target && !target.querySelector('.enemy') && !target.classList.contains('enemy-nest') && !target.classList.contains('rock')) {
                                    let d = getDistance(nr, nc, gameState.nestLocation.r, gameState.nestLocation.c);
                                    if(d < minDist) { minDist = d; best = target; }
                                }
                            }
                        }
                    }
                    if (best) {
                        if (best.querySelector('.ant, .worker, .elite') || best.classList.contains('nest')) {
                            if (Math.random() > 0.5) {
                                if(best.classList.contains('nest')) { gameState.bio = Math.max(0, gameState.bio - 3); showMessage("Nájezd! Ztráta 3 Bio!", "#e74c3c"); hex.innerHTML = ''; }
                                else { best.innerHTML = '<div class="enemy">🐜</div>'; hex.innerHTML = ''; showMessage("Nepřítel zabil tvého mravence!", "#e74c3c"); }
                            } else { hex.innerHTML = ''; showMessage("Tvůj mravenec odrazil útok!", "#2ecc71"); }
                        } else { best.innerHTML = '<div class="enemy">🐜</div>'; hex.innerHTML = ''; }
                    }
                }
            });
        }

        function nextTurn() {
            moveEnemies();
            gameState.feromons += 5;
            if (Math.random() < 0.4) spawnResources(1);
            if (Math.random() < 0.6) spawnEnemy();
            updateUI();
        }

        createBoard(); spawnRocks(); spawnResources(5); spawnEnemy(); updateUI();
    </script>

</body>
</html>
