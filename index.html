<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Mravenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
        }

        #board { margin-top: 20px; }

        .hex-row {
            display: flex;
            margin-bottom: -15px;
        }

        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        .hex.nest {
            background-color: #5d4037;
            border: 2px solid #f1c40f;
        }
        .hex.nest::after {
            content: "VCHOD";
            font-size: 10px;
            position: absolute;
            top: 70%;
            left: 20%;
            color: #f1c40f;
            pointer-events: none;
        }

        .hex.selected { background-color: #3498db; transform: scale(1.1); }

        /* Vzhled mravence */
        .ant {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        /* Vzhled potravy (Bio) */
        .resource {
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #d35400; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        <p><strong>Feromonové body:</strong> <span id="fb-count">0</span></p>
        <hr>
        <h3>Podzemní Sklad</h3>
        <p>Bio (Jídlo): <span id="bio-count">0</span></p>
        <p>Materiál: <span id="mat-count">0</span></p>
        <hr>
        <h3>Akce</h3>
        <button id="btn-hatch" onclick="hatchAnt()">Vylíhnout Vojáka (1 Bio)</button>
        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db;">Ukončit tah (+5 FB)</button>
        <p id="message" style="color: #2ecc71; font-weight: bold; min-height: 20px;"></p>
    </div>

    <script>
        // DATA HRY
        let gameState = {
            bio: 2, // Snížil jsem začáteční jídlo, ať tě hra donutí hned těžit
            material: 10,
            feromons: 5,
            nestLocation: { r: 5, c: 0 }
        };

        let selectedHex = null;

        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        // AKTUALIZACE UI
        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            
            document.getElementById('btn-hatch').disabled = (gameState.bio < 1 || gameState.feromons < 1);
        }

        function showMessage(text, color = "#2ecc71") {
            const msgObj = document.getElementById('message');
            msgObj.innerText = text;
            msgObj.style.color = color;
            setTimeout(() => { msgObj.innerText = ""; }, 3000);
        }

        // KONTROLA SOUSEDSTVÍ
        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            
            if (dr === 0 && dc === 1) return true; 

            if (dr === 1) {
                const isShifted = (r1 % 2 !== 0);
                if (isShifted) {
                    if (c2 === c1 || c2 === c1 + 1) return true;
                } else {
                    if (c2 === c1 || c2 === c1 - 1) return true;
                }
            }
            return false;
        }

        // GENERÁTOR POTRAVY
        function spawnResources(amount) {
            let spawned = 0;
            let attempts = 0; // Pojistka proti zacyklení
            while (spawned < amount && attempts < 100) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                
                // Nestavět potravu na vchod hnízda ani na políčka, kde už něco je
                if (!hex.classList.contains('nest') && hex.innerHTML === '') {
                    hex.innerHTML = '<div class="resource">🌱</div>';
                    spawned++;
                }
                attempts++;
            }
        }

        // GENEROVÁNÍ MAPY
        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';

                for (let c = 0; c < columns; c++) {
                    const hexElement = document.createElement('div');
                    hexElement.className = 'hex';
                    hexElement.id = `hex-${r}-${c}`;
                    hexElement.dataset.row = r;
                    hexElement.dataset.col = c;
                    
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) {
                        hexElement.classList.add('nest');
                    }

                    // KLIKNUTÍ NA POLÍČKO
                    hexElement.addEventListener('click', function() {
                        const clickedRow = parseInt(this.dataset.row);
                        const clickedCol = parseInt(this.dataset.col);
                        const hasAnt = this.querySelector('.ant') !== null;
                        const hasResource = this.querySelector('.resource') !== null;

                        if (selectedHex) {
                            if (this === selectedHex) {
                                // Odznačení
                                this.classList.remove('selected');
                                selectedHex = null;
                            } else if (hasAnt) {
                                // Výběr jiného mravence
                                selectedHex.classList.remove('selected');
                                this.classList.add('selected');
                                selectedHex = this;
                            } else {
                                // POKUS O POHYB (Na prázdno nebo na surovinu)
                                if (gameState.feromons >= 1) {
                                    const sr = parseInt(selectedHex.dataset.row);
                                    const sc = parseInt(selectedHex.dataset.col);
                                    
                                    if (isAdjacent(sr, sc, clickedRow, clickedCol)) {
                                        
                                        // Zpracování těžby!
                                        if (hasResource) {
                                            gameState.bio += 2;
                                            showMessage("Získáno +2 Bio!", "#f1c40f");
                                        }

                                        // Přesun mravence (přepíše případnou surovinu)
                                        this.innerHTML = '<div class="ant">🐜</div>';
                                        selectedHex.innerHTML = '';
                                        
                                        // Dokončení
                                        selectedHex.classList.remove('selected');
                                        selectedHex = null;
                                        gameState.feromons -= 1;
                                        updateUI();
                                    } else {
                                        showMessage("Tam nedosáhneš!", "#e74c3c");
                                    }
                                } else {
                                    showMessage("Nemáš Feromonové body!", "#e74c3c");
                                    selectedHex.classList.remove('selected');
                                    selectedHex = null;
                                }
                            }
                        } else {
                            // První klik - pokud je tam mravenec, vyber ho
                            if (hasAnt) {
                                this.classList.add('selected');
                                selectedHex = this;
                            }
                        }
                    });

                    rowElement.appendChild(hexElement);
                }
                boardElement.appendChild(rowElement);
            }
        }

        // LÍHNUTÍ
        function hatchAnt() {
            const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
            
            if (nestHex.querySelector('.ant') !== null) {
                showMessage("Vchod je zablokovaný!", "#e74c3c");
                return;
            }

            if (gameState.bio >= 1 && gameState.feromons >= 1) {
                nestHex.innerHTML = '<div class="ant">🐜</div>';
                gameState.bio -= 1;
                gameState.feromons -= 1;
                updateUI();
            }
        }

        // KONEC TAHU (PŘIDÁNO GNEROVÁNÍ POTRAVY)
        function nextTurn() {
            gameState.feromons += 5;
            
            // 30% šance, že se na mapě objeví nová potrava
            if (Math.random() < 0.3) {
                spawnResources(1);
                showMessage("Zavál vítr a přinesl novou potravu!", "#3498db");
            }
            
            updateUI();
        }

        // INICIALIZACE HRY
        createBoard();
        spawnResources(5); // Na začátku mapy rozhodíme 5 kousků jídla
        updateUI();
    </script>

</body>
</html>
