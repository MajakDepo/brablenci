<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Mravenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
            max-width: 350px;
        }

        #board { margin-top: 20px; }

        .hex-row { display: flex; margin-bottom: -15px; }
        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        .hex.nest { background-color: #5d4037; border: 2px solid #f1c40f; }
        .hex.enemy-nest { background-color: #c0392b; border: 2px solid #000; }
        .hex.rock { background-color: #7f8c8d; cursor: not-allowed; }
        .hex.rock::after { content: "🪨"; font-size: 30px; position: absolute; top: 15%; left: 15%; pointer-events: none; }

        .hex.selected { background-color: #3498db; transform: scale(1.1); }

        /* JEDNOTKY A ZDROJE */
        .ant, .worker, .elite, .enemy, .res-bio, .res-mat, .res-cake {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        /* NEPŘÁTELSKÉ TŘÍDY */
        .enemy { border-radius: 50%; }
        .enemy-attacker { background-color: rgba(231, 76, 60, 0.4); } /* Červená aura */
        .enemy-defender { background-color: rgba(142, 68, 173, 0.5); border: 2px solid #8e44ad; } /* Fialová aura + okraj */

        h3 { border-bottom: 1px solid #7f8c8d; padding-bottom: 5px; margin-top: 20px; }
        
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px;
            margin: 3px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            font-size: 13px;
        }

        button:disabled { background-color: #7f8c8d; cursor: not-allowed; opacity: 0.6; }
        button:hover:not(:disabled) { background-color: #d35400; }

        .stats-box { background: #2c3e50; padding: 10px; border-radius: 5px; margin-bottom: 10px; line-height: 1.5; }
        .hp-bar { font-weight: bold; color: #e74c3c; }
        .hp-bar.player { color: #2ecc71; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        
        <div class="stats-box">
            <strong>Naše hnízdo (HP):</strong> <span id="player-hp" class="hp-bar player">10</span>/10<br>
            <strong>Cizí hnízdo (HP):</strong> <span id="enemy-hp" class="hp-bar">10</span>/10<br>
            <hr style="border-color: #7f8c8d; margin: 8px 0;">
            <strong>Feromonové body:</strong> <span id="fb-count">0</span><br>
            <strong>Bio (Jídlo):</strong> <span id="bio-count">0</span><br>
            <strong>Materiál:</strong> <span id="mat-count">0</span>
        </div>

        <h3>Podzemní stavba</h3>
        <button id="btn-build-hatchery" onclick="buildHatchery()">Postavit Líheň 2 (20 Mat)</button>

        <h3>Líhnutí mravenců</h3>
        <button id="btn-hatch-worker" onclick="hatchUnit('worker')">Dělník 👷 (1 Bio)</button>
        <button id="btn-hatch-basic" onclick="hatchUnit('basic')">Základní voják 🐜 (1 Bio)</button>
        <button id="btn-hatch-elite" onclick="hatchUnit('elite')" disabled>Elitní voják 🦂 (3 Bio)</button>

        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db; margin-top: 20px;">Ukončit tah (+5 FB)</button>
        
        <p id="message" style="color: #2ecc71; font-weight: bold; min-height: 50px; margin-top: 15px; font-size: 14px;"></p>
    </div>

    <script>
        let gameState = {
            playerHP: 10,
            enemyHP: 10,
            bio: 3,
            material: 0,
            feromons: 10,
            hatcheryLvl: 1,
            nestLocation: { r: 5, c: 0 },
            enemyNestLocation: { r: 2, c: 10 },
            rocksAmount: 12
        };

        let selectedHex = null;
        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            document.getElementById('player-hp').innerText = gameState.playerHP;
            document.getElementById('enemy-hp').innerText = gameState.enemyHP;
            
            document.getElementById('btn-build-hatchery').disabled = (gameState.material < 20 || gameState.hatcheryLvl >= 2);
            if(gameState.hatcheryLvl >= 2) document.getElementById('btn-build-hatchery').innerText = "Líheň 2 postavená ✅";
            
            document.getElementById('btn-hatch-basic').disabled = (gameState.bio < 1 || gameState.feromons < 1);
            document.getElementById('btn-hatch-worker').disabled = (gameState.bio < 1 || gameState.feromons < 1);
            document.getElementById('btn-hatch-elite').disabled = (gameState.bio < 3 || gameState.feromons < 1 || gameState.hatcheryLvl < 2);
        }

        function showMessage(text, color = "#2ecc71", duration = 4500) {
            const msgObj = document.getElementById('message');
            msgObj.innerHTML = text;
            msgObj.style.color = color;
            setTimeout(() => { msgObj.innerHTML = ""; }, duration);
        }

        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            if (dr === 0 && dc === 1) return true; 
            if (dr === 1) {
                const isShifted = (r1 % 2 !== 0);
                if (isShifted) { if (c2 === c1 || c2 === c1 + 1) return true; }
                else { if (c2 === c1 || c2 === c1 - 1) return true; }
            }
            return false;
        }

        function getDistance(r1, c1, r2, c2) { return Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(c1 - c2, 2)); }

        function checkWinCondition() {
            if (gameState.enemyHP <= 0) {
                setTimeout(() => { alert("🏆 VÍTĚZSTVÍ! Nepřátelské hnízdo bylo zničeno!"); location.reload(); }, 100);
            } else if (gameState.playerHP <= 0) {
                setTimeout(() => { alert("💀 PROHRA! Tvé hnízdo podlehlo nájezdům nepřítele."); location.reload(); }, 100);
            }
        }

        function buildHatchery() {
            if (gameState.material >= 20) {
                gameState.material -= 20;
                gameState.hatcheryLvl = 2;
                showMessage("Líheň 2 postavená! Odemčeni 🦂", "#f1c40f");
                updateUI();
            }
        }

        function hatchUnit(type) {
            const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
            if (nestHex.innerHTML !== '') { showMessage("Vchod je zablokovaný!", "#e74c3c"); return; }
            let cost = (type === 'elite') ? 3 : 1;
            if (gameState.bio >= cost && gameState.feromons >= 1) {
                let icon = '🐜', className = 'ant';
                if(type === 'worker') { icon = '👷'; className = 'worker'; }
                if(type === 'elite') { icon = '🦂'; className = 'elite'; }
                nestHex.innerHTML = `<div class="${className}">${icon}</div>`;
                gameState.bio -= cost; gameState.feromons -= 1; updateUI();
            }
        }

        function spawnRocks() {
            let spawned = 0;
            while (spawned < gameState.rocksAmount) {
                const r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                if (hex && getDistance(r, c, gameState.nestLocation.r, gameState.nestLocation.c) > 1.5 && getDistance(r, c, gameState.enemyNestLocation.r, gameState.enemyNestLocation.c) > 1.5 && hex.innerHTML === '' && !hex.classList.contains('rock')) {
                    hex.classList.add('rock'); spawned++;
                }
            }
        }

        function spawnResources(amount) {
            let spawned = 0;
            while (spawned < amount) {
                const r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                if (hex && hex.innerHTML === '' && !hex.classList.contains('rock') && !hex.classList.contains('nest') && !hex.classList.contains('enemy-nest')) {
                    if (Math.random() > 0.3) hex.innerHTML = '<div class="res-bio">🌱</div>';
                    else hex.innerHTML = '<div class="res-mat">🪹</div>';
                    spawned++;
                }
            }
        }

        // VYLEPŠENÉ LÍHNUTÍ NEPŘÁTEL (Obránci vs Útočníci)
        function spawnEnemy() {
            const r = gameState.enemyNestLocation.r, c = gameState.enemyNestLocation.c;
            const nest = document.getElementById(`hex-${r}-${c}`);
            
            // 30% šance na obránce, 70% na útočníka
            const isDefender = Math.random() < 0.3;
            const enemyClass = isDefender ? 'enemy enemy-defender' : 'enemy enemy-attacker';
            const enemyIcon = isDefender ? '🪲' : '🐜';
            const htmlString = `<div class="${enemyClass}">${enemyIcon}</div>`;

            if (nest.innerHTML === '') {
                nest.innerHTML = htmlString;
            } else {
                // Pokus se vyhodit mravence na políčko vedle hnízda
                for(let dr=-1; dr<=1; dr++) {
                    for(let dc=-1; dc<=1; dc++) {
                        const nr = r+dr, nc = c+dc;
                        if(nr>=0 && nr<rows && nc>=0 && nc<columns && isAdjacent(r,c,nr,nc)) {
                            const h = document.getElementById(`hex-${nr}-${nc}`);
                            if(h && h.innerHTML === '' && !h.classList.contains('rock')) { 
                                h.innerHTML = htmlString; return; 
                            }
                        }
                    }
                }
            }
        }

        function countAlliesAround(row, col) {
            let allies = 0;
            document.querySelectorAll('.hex').forEach(hex => {
                if (hex.querySelector('.ant, .worker, .elite') && isAdjacent(row, col, parseInt(hex.dataset.row), parseInt(hex.dataset.col))) allies++;
            });
            return allies;
        }

        function triggerRandomEvent() {
            const eventRoll = Math.random();
            if (eventRoll < 0.25) {
                const eventType = Math.floor(Math.random() * 3);
                if (eventType === 0) {
                    document.querySelectorAll('.res-bio, .res-mat, .res-cake').forEach(res => res.parentElement.innerHTML = '');
                    showMessage("🌧️ UDÁLOST: Začalo pršet! Suroviny spláchnuty.", "#3498db", 6000);
                } else if (eventType === 1) {
                    const allAnts = Array.from(document.querySelectorAll('.ant, .worker, .elite, .enemy'));
                    if (allAnts.length > 0) {
                        const victim = allAnts[Math.floor(Math.random() * allAnts.length)];
                        if (selectedHex === victim.parentElement) { selectedHex.classList.remove('selected'); selectedHex = null; }
                        victim.parentElement.innerHTML = '';
                        showMessage("🐦 UDÁLOST: Pták sezobnul mravence!", "#e74c3c", 6000);
                    }
                } else if (eventType === 2) {
                    let spawned = 0;
                    while (spawned < 3) {
                        const r = Math.floor(Math.random() * rows), c = Math.floor(Math.random() * columns);
                        const hex = document.getElementById(`hex-${r}-${c}`);
                        if (hex && hex.innerHTML === '' && !hex.classList.contains('rock') && !hex.classList.contains('nest') && !hex.classList.contains('enemy-nest')) {
                            hex.innerHTML = '<div class="res-cake">🍰</div>'; spawned++;
                        }
                    }
                    showMessage("🍰 UDÁLOST: Piknik! Na mapu spadly dorty.", "#9b59b6", 6000);
                }
            }
        }

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';
                for (let c = 0; c < columns; c++) {
                    const hex = document.createElement('div');
                    hex.className = 'hex'; hex.id = `hex-${r}-${c}`;
                    hex.dataset.row = r; hex.dataset.col = c;
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) hex.classList.add('nest');
                    if (r === gameState.enemyNestLocation.r && c === gameState.enemyNestLocation.c) hex.classList.add('enemy-nest');

                    hex.addEventListener('click', function() {
                        const r = parseInt(this.dataset.row), c = parseInt(this.dataset.col);
                        const myUnit = this.querySelector('.ant, .worker, .elite');
                        const enemy = this.querySelector('.enemy');
                        const isDefender = this.querySelector('.enemy-defender') !== null;
                        
                        const resBio = this.querySelector('.res-bio');
                        const resMat = this.querySelector('.res-mat');
                        const resCake = this.querySelector('.res-cake');
                        const isEnemyNest = this.classList.contains('enemy-nest');
                        const isMyNest = this.classList.contains('nest');

                        if (selectedHex) {
                            const sr = parseInt(selectedHex.dataset.row), sc = parseInt(selectedHex.dataset.col);
                            if (this === selectedHex) { this.classList.remove('selected'); selectedHex = null; }
                            else if (myUnit) { selectedHex.classList.remove('selected'); this.classList.add('selected'); selectedHex = this; }
                            else if (isAdjacent(sr, sc, r, c) && !this.classList.contains('rock')) {
                                if (gameState.feromons < 1) { showMessage("Nemáš FB!", "#e74c3c"); return; }
                                if (isMyNest) { showMessage("Zpět do hnízda vstoupit nelze.", "#e74c3c"); return; }

                                const type = selectedHex.children[0].className;
                                
                                // ÚTOK NA SAMOTNÉ HNÍZDO
                                if (isEnemyNest && !enemy) {
                                    if(type === 'worker') { showMessage("Dělník neumí dobývat hnízdo!", "#e74c3c"); return; }
                                    let roll = Math.floor(Math.random() * 6) + 1, bonus = countAlliesAround(r, c) - 1;
                                    if (type === 'elite') bonus += 1;
                                    if (roll + bonus >= 4) {
                                        gameState.enemyHP -= 2; showMessage(`🔥 Oblehací útok! Hnízdo ztrácí 2 HP.`, "#e67e22");
                                    } else {
                                        showMessage(`Útok na hnízdo selhal. Mravenec padl.`, "#e74c3c"); selectedHex.innerHTML = '';
                                    }
                                    selectedHex.classList.remove('selected'); selectedHex = null;
                                    gameState.feromons -= 1; updateUI(); checkWinCondition(); return;
                                }

                                // ÚTOK NA NEPŘÍTELE (S POSTIHEM ZA OBRÁNCE)
                                if (enemy) {
                                    if(type === 'worker') { showMessage("Dělník byl sežrán!", "#e74c3c"); selectedHex.innerHTML = ''; }
                                    else {
                                        let roll = Math.floor(Math.random() * 6) + 1;
                                        let bonus = countAlliesAround(r, c) - 1;
                                        if (type === 'elite') bonus += 1;
                                        
                                        let penalty = isDefender ? 1 : 0; // OBRNĚNÝ NEPŘÍTEL!
                                        let finalResult = roll + bonus - penalty;
                                        let penaltyText = isDefender ? " (-1 Krunýř)" : "";
                                        
                                        if (finalResult >= 4) {
                                            gameState.bio += 1; gameState.material += (isDefender ? 3 : 2); // Obránce dá víc materiálu
                                            showMessage(`Boj: ${roll} + ${bonus}${penaltyText} = <strong>${finalResult}</strong>. Vítězství!`, "#f1c40f");
                                            if(!isEnemyNest) { this.innerHTML = selectedHex.innerHTML; selectedHex.innerHTML = ''; }
                                        } else { 
                                            showMessage(`Boj: ${roll} + ${bonus}${penaltyText} = <strong>${finalResult}</strong>. Prohra!`, "#e74c3c"); 
                                            selectedHex.innerHTML = ''; 
                                        }
                                    }
                                } else {
                                    // TĚŽBA
                                    if (resBio) { gameState.bio += (type === 'worker') ? 3 : 2; }
                                    if (resMat) { gameState.material += (type === 'worker') ? 4 : 2; }
                                    if (resCake) { gameState.bio += (type === 'worker') ? 6 : 4; }
                                    this.innerHTML = selectedHex.innerHTML; selectedHex.innerHTML = '';
                                }
                                selectedHex.classList.remove('selected'); selectedHex = null;
                                gameState.feromons -= 1; updateUI(); checkWinCondition();
                            }
                        } else if (myUnit) { this.classList.add('selected'); selectedHex = this; }
                    });
                    rowElement.appendChild(hex);
                }
                boardElement.appendChild(rowElement);
            }
        }

        // CHYTŘEJŠÍ POHYB AI (Obránci vs Útočníci)
        function moveEnemies() {
            document.querySelectorAll('.hex').forEach(hex => {
                const enemyUnit = hex.querySelector('.enemy');
                if (enemyUnit) {
                    const isDefender = enemyUnit.classList.contains('enemy-defender');
                    const r = parseInt(hex.dataset.row), c = parseInt(hex.dataset.col);
                    
                    // KROK 1: Může AI někoho napadnout? (Zkontroluje okolí)
                    let possibleAttacks = [];
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            const nr=r+dr, nc=c+dc;
                            if(nr>=0 && nr<rows && nc>=0 && nc<columns && isAdjacent(r,c,nr,nc)) {
                                const target = document.getElementById(`hex-${nr}-${nc}`);
                                if(target && (target.querySelector('.ant, .worker, .elite') || target.classList.contains('nest'))) {
                                    possibleAttacks.push(target);
                                }
                            }
                        }
                    }

                    // Pokud má nepřítel u sebe hráče, zaútočí (Obránce i útočník!)
                    if (possibleAttacks.length > 0) {
                        const targetHex = possibleAttacks.find(h => h.classList.contains('nest')) || possibleAttacks[0];
                        if (Math.random() > 0.5) { // 50% šance na úspěch AI útoku
                            if(targetHex.classList.contains('nest')) { 
                                gameState.playerHP -= 1; 
                                gameState.bio = Math.max(0, gameState.bio - 1); 
                                showMessage("⚠️ Nájezd! Ztráta 1 HP a 1 Bio!", "#e74c3c"); 
                                hex.innerHTML = ''; // Sebevražedný nájezd
                            } else { 
                                targetHex.innerHTML = enemyUnit.outerHTML; 
                                hex.innerHTML = ''; 
                            }
                        } else { 
                            hex.innerHTML = ''; // Nepřítel při útoku zemřel
                        }
                        return; // Tento mravenec svůj tah skončil
                    }

                    // KROK 2: Pokud nezaútočil, hledá cestu
                    // OBRÁNCE se drží u hnízda (pokud je dál než 1 hex, vrátí se)
                    if (isDefender) {
                        const distToHome = getDistance(r, c, gameState.enemyNestLocation.r, gameState.enemyNestLocation.c);
                        if (distToHome <= 1) return; // Obránce stojí na místě a hlídá
                    }

                    // ÚTOČNÍK (Nebo zbloudilý obránce) se posune
                    const targetR = isDefender ? gameState.enemyNestLocation.r : gameState.nestLocation.r;
                    const targetC = isDefender ? gameState.enemyNestLocation.c : gameState.nestLocation.c;
                    
                    let best = null, minDist = 999;
                    for(let dr=-1; dr<=1; dr++) {
                        for(let dc=-1; dc<=1; dc++) {
                            const nr=r+dr, nc=c+dc;
                            if(nr>=0 && nr<rows && nc>=0 && nc<columns && isAdjacent(r,c,nr,nc)) {
                                const t = document.getElementById(`hex-${nr}-${nc}`);
                                if(t && !t.querySelector('.enemy') && !t.classList.contains('enemy-nest') && !t.classList.contains('rock')) {
                                    let d = getDistance(nr, nc, targetR, targetC);
                                    if(d < minDist) { minDist = d; best = t; }
                                }
                            }
                        }
                    }
                    if (best) {
                        best.innerHTML = enemyUnit.outerHTML; 
                        hex.innerHTML = '';
                    }
                }
            });
            checkWinCondition();
        }

        function nextTurn() {
            moveEnemies();
            triggerRandomEvent();
            gameState.feromons += 5;
            if (Math.random() < 0.4) spawnResources(1);
            if (Math.random() < 0.6) spawnEnemy();
            updateUI();
        }

        createBoard(); spawnRocks(); spawnResources(6); spawnEnemy(); updateUI();
    </script>
</body>
</html>
