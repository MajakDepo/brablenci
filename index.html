<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Válka Mravenců - Prototyp</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: Arial, sans-serif;
            display: flex;
            margin: 0;
            padding: 20px;
        }

        #game-area { flex: 2; }

        #ui-panel {
            flex: 1;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            margin-left: 20px;
        }

        #board { margin-top: 20px; }

        .hex-row {
            display: flex;
            margin-bottom: -15px;
        }

        .hex-row:nth-child(even) { margin-left: 32px; }

        .hex {
            width: 60px;
            height: 70px;
            background-color: #8d6e63;
            margin-right: 4px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            position: relative;
        }

        .hex:hover { background-color: #a1887f; transform: scale(1.05); }

        .hex.nest {
            background-color: #5d4037;
            border: 2px solid #f1c40f;
        }
        .hex.nest::after {
            content: "VCHOD";
            font-size: 10px;
            position: absolute;
            top: 70%;
            left: 20%;
            color: #f1c40f;
            pointer-events: none;
        }

        .hex.enemy-nest {
            background-color: #c0392b;
            border: 2px solid #000;
        }
        .hex.enemy-nest::after {
            content: "CÍZÍ HNÍZDO";
            font-size: 9px;
            position: absolute;
            top: 70%;
            left: 5%;
            color: #fff;
            pointer-events: none;
        }

        .hex.selected { background-color: #3498db; transform: scale(1.1); }

        .ant {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        .enemy {
            font-size: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
            background-color: rgba(231, 76, 60, 0.4);
            border-radius: 50%;
        }

        .resource {
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            pointer-events: none;
        }

        button {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px 0;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        button:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #d35400; }
    </style>
</head>
<body>

    <div id="game-area">
        <h1>Válka Mravenců</h1>
        <div id="board"></div>
    </div>

    <div id="ui-panel">
        <h2 id="faction-name">Frakce: Blacks</h2>
        <p><strong>Feromonové body:</strong> <span id="fb-count">0</span></p>
        <hr>
        <h3>Podzemní Sklad</h3>
        <p>Bio (Jídlo): <span id="bio-count">0</span></p>
        <p>Materiál: <span id="mat-count">0</span></p>
        <hr>
        <h3>Akce</h3>
        <button id="btn-hatch" onclick="hatchAnt()">Vylíhnout Vojáka (1 Bio)</button>
        <button id="btn-end-turn" onclick="nextTurn()" style="background-color: #3498db;">Ukončit tah (+5 FB)</button>
        <p id="message" style="color: #2ecc71; font-weight: bold; min-height: 40px; margin-top: 15px; line-height: 1.4;"></p>
    </div>

    <script>
        // DATA HRY
        let gameState = {
            bio: 3,
            material: 10,
            feromons: 5,
            nestLocation: { r: 5, c: 0 },
            enemyNestLocation: { r: 2, c: 10 }
        };

        let selectedHex = null;
        const columns = 12;
        const rows = 10;
        const boardElement = document.getElementById('board');

        function updateUI() {
            document.getElementById('bio-count').innerText = gameState.bio;
            document.getElementById('mat-count').innerText = gameState.material;
            document.getElementById('fb-count').innerText = gameState.feromons;
            document.getElementById('btn-hatch').disabled = (gameState.bio < 1 || gameState.feromons < 1);
        }

        function showMessage(text, color = "#2ecc71") {
            const msgObj = document.getElementById('message');
            msgObj.innerHTML = text; 
            msgObj.style.color = color;
            // Delší časovače, ať se stíhají číst zprávy z AI
            setTimeout(() => { msgObj.innerHTML = ""; }, 4000); 
        }

        function isAdjacent(r1, c1, r2, c2) {
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            if (dr === 0 && dc === 1) return true; 
            if (dr === 1) {
                const isShifted = (r1 % 2 !== 0);
                if (isShifted) {
                    if (c2 === c1 || c2 === c1 + 1) return true;
                } else {
                    if (c2 === c1 || c2 === c1 - 1) return true;
                }
            }
            return false;
        }

        // Pomocná funkce pro AI: Výpočet hrubé vzdálenosti k cíli
        function getDistance(r1, c1, r2, c2) {
            return Math.sqrt(Math.pow(r1 - r2, 2) + Math.pow(c1 - c2, 2));
        }

        function spawnResources(amount) {
            let spawned = 0;
            let attempts = 0;
            while (spawned < amount && attempts < 100) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * columns);
                const hex = document.getElementById(`hex-${r}-${c}`);
                
                if (!hex.classList.contains('nest') && !hex.classList.contains('enemy-nest') && hex.innerHTML === '') {
                    hex.innerHTML = '<div class="resource">🌱</div>';
                    spawned++;
                }
                attempts++;
            }
        }

        function spawnEnemy() {
            const r = gameState.enemyNestLocation.r;
            const c = gameState.enemyNestLocation.c;
            const enemyNestHex = document.getElementById(`hex-${r}-${c}`);
            
            if (enemyNestHex.innerHTML === '') {
                enemyNestHex.innerHTML = '<div class="enemy">🐜</div>';
            } else {
                const possibleMoves = [];
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const checkR = r + dr;
                        const checkC = c + dc;
                        if (checkR >= 0 && checkR < rows && checkC >= 0 && checkC < columns) {
                            if (isAdjacent(r, c, checkR, checkC)) {
                                const checkHex = document.getElementById(`hex-${checkR}-${checkC}`);
                                if (checkHex && checkHex.innerHTML === '') {
                                    possibleMoves.push(checkHex);
                                }
                            }
                        }
                    }
                }
                if (possibleMoves.length > 0) {
                    const randomHex = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                    randomHex.innerHTML = '<div class="enemy">🐜</div>';
                }
            }
        }

        // UMĚLÁ INTELIGENCE NEPŘÁTEL
        function moveEnemies() {
            // Najdeme všechny políčka s nepřítelem a uložíme si je
            const enemyHexes = [];
            document.querySelectorAll('.hex').forEach(hex => {
                if (hex.querySelector('.enemy') !== null) {
                    enemyHexes.push(hex);
                }
            });

            // Cíl AI je tvůj vchod
            const targetR = gameState.nestLocation.r;
            const targetC = gameState.nestLocation.c;

            enemyHexes.forEach(enemyHex => {
                const r = parseInt(enemyHex.dataset.row);
                const c = parseInt(enemyHex.dataset.col);

                let bestMove = null;
                let minDistance = 9999; // Nastavíme vysokou výchozí hodnotu

                // AI skenuje všech 6 políček kolem sebe
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const checkR = r + dr;
                        const checkC = c + dc;
                        
                        if (checkR >= 0 && checkR < rows && checkC >= 0 && checkC < columns) {
                            if (isAdjacent(r, c, checkR, checkC)) {
                                const targetHex = document.getElementById(`hex-${checkR}-${checkC}`);
                                
                                // AI nesmí stoupnout na jiného nepřítele ani na své vlastní hnízdo
                                if (targetHex.querySelector('.enemy') === null && !targetHex.classList.contains('enemy-nest')) {
                                    const dist = getDistance(checkR, checkC, targetR, targetC);
                                    if (dist < minDistance) {
                                        minDistance = dist;
                                        bestMove = targetHex;
                                    }
                                }
                            }
                        }
                    }
                }

                // Pokud AI našlo cestu
                if (bestMove) {
                    const hasPlayerAnt = bestMove.querySelector('.ant') !== null;
                    const isPlayerNest = bestMove.classList.contains('nest');

                    if (hasPlayerAnt || isPlayerNest) {
                        // AI ÚTOČÍ!
                        const aiRoll = Math.floor(Math.random() * 6) + 1;
                        if (aiRoll >= 4) {
                            if (isPlayerNest) {
                                showMessage("Kritické varování! Nepřítel pronikl do tvého hnízda! Ztrácíš 5 Bio!", "#e74c3c");
                                gameState.bio = Math.max(0, gameState.bio - 5);
                                enemyHex.innerHTML = ''; // Nepřítel zmizí v útrobách hnízda
                            } else {
                                showMessage(`⚠️ Nepřítel zaútočil! (Hod: ${aiRoll})<br>Porazil tvého mravence a zabral pozici!`, "#e74c3c");
                                bestMove.innerHTML = '<div class="enemy">🐜</div>';
                                enemyHex.innerHTML = '';
                            }
                        } else {
                            showMessage(`🛡️ Nepřítel zaútočil! (Hod: ${aiRoll})<br>Tvůj mravenec útok hrdinsky odrazil a nepřítele zničil!`, "#2ecc71");
                            enemyHex.innerHTML = ''; // Nepřítel padl
                        }
                        updateUI();
                    } else {
                        // AI se normálně pohne (pokud tam bylo jídlo, sešlápne ho)
                        bestMove.innerHTML = '<div class="enemy">🐜</div>';
                        enemyHex.innerHTML = '';
                    }
                }
            });
        }

        function createBoard() {
            boardElement.innerHTML = "";
            for (let r = 0; r < rows; r++) {
                const rowElement = document.createElement('div');
                rowElement.className = 'hex-row';

                for (let c = 0; c < columns; c++) {
                    const hexElement = document.createElement('div');
                    hexElement.className = 'hex';
                    hexElement.id = `hex-${r}-${c}`;
                    hexElement.dataset.row = r;
                    hexElement.dataset.col = c;
                    
                    if (r === gameState.nestLocation.r && c === gameState.nestLocation.c) {
                        hexElement.classList.add('nest');
                    }
                    if (r === gameState.enemyNestLocation.r && c === gameState.enemyNestLocation.c) {
                        hexElement.classList.add('enemy-nest');
                    }

                    hexElement.addEventListener('click', function() {
                        const clickedRow = parseInt(this.dataset.row);
                        const clickedCol = parseInt(this.dataset.col);
                        const hasAnt = this.querySelector('.ant') !== null;
                        const hasResource = this.querySelector('.resource') !== null;
                        const hasEnemy = this.querySelector('.enemy') !== null;

                        if (selectedHex) {
                            if (this === selectedHex) {
                                this.classList.remove('selected');
                                selectedHex = null;
                            } else if (hasAnt) {
                                selectedHex.classList.remove('selected');
                                this.classList.add('selected');
                                selectedHex = this;
                            } else {
                                if (gameState.feromons >= 1) {
                                    const sr = parseInt(selectedHex.dataset.row);
                                    const sc = parseInt(selectedHex.dataset.col);
                                    
                                    if (isAdjacent(sr, sc, clickedRow, clickedCol)) {
                                        
                                        // ZPRACOVÁNÍ TVÉHO ÚTOKU
                                        if (hasEnemy) {
                                            const diceRoll = Math.floor(Math.random() * 6) + 1;
                                            
                                            if (diceRoll >= 4) {
                                                gameState.bio += 1;
                                                showMessage(`⚔️ Útok! Hod kostkou: <strong>${diceRoll}</strong><br>Úspěšný zásah! Nepřítel byl zničen (+1 Bio).`, "#f1c40f");
                                                this.innerHTML = '<div class="ant">🐜</div>';
                                                selectedHex.innerHTML = '';
                                            } else {
                                                showMessage(`⚔️ Útok! Hod kostkou: <strong>${diceRoll}</strong><br>Minul jsi! Tvůj mravenec padl v boji.`, "#e74c3c");
                                                selectedHex.innerHTML = '';
                                            }
                                        } 
                                        else {
                                            if (hasResource) {
                                                gameState.bio += 2;
                                                showMessage("Získáno +2 Bio!", "#2ecc71");
                                            }
                                            this.innerHTML = '<div class="ant">🐜</div>';
                                            selectedHex.innerHTML = '';
                                        }

                                        selectedHex.classList.remove('selected');
                                        selectedHex = null;
                                        gameState.feromons -= 1;
                                        updateUI();
                                    } else {
                                        showMessage("Tam nedosáhneš!", "#e74c3c");
                                    }
                                } else {
                                    showMessage("Nemáš Feromonové body!", "#e74c3c");
                                    selectedHex.classList.remove('selected');
                                    selectedHex = null;
                                }
                            }
                        } else {
                            if (hasAnt) {
                                this.classList.add('selected');
                                selectedHex = this;
                            }
                        }
                    });

                    rowElement.appendChild(hexElement);
                }
                boardElement.appendChild(rowElement);
            }
        }

        function hatchAnt() {
            const nestHex = document.getElementById(`hex-${gameState.nestLocation.r}-${gameState.nestLocation.c}`);
            if (nestHex.querySelector('.ant') !== null) {
                showMessage("Vchod je zablokovaný!", "#e74c3c");
                return;
            }
            if (gameState.bio >= 1 && gameState.feromons >= 1) {
                nestHex.innerHTML = '<div class="ant">🐜</div>';
                gameState.bio -= 1;
                gameState.feromons -= 1;
                updateUI();
            }
        }

        function nextTurn() {
            // NEJPRVE ZAHRAJE AI (pohnou se stávající nepřátelé)
            moveEnemies();

            // POTÉ SE DOBUDOU TVÉ BODY A OBJEVI SE NOVÉ VĚCI
            gameState.feromons += 5;
            
            if (Math.random() < 0.3) {
                spawnResources(1);
            }
            
            if (Math.random() < 0.5) {
                spawnEnemy();
                // Nebudeme psát zprávu o každém vylíhnutí, aby nepřepisovala zprávy z boje
            }
            
            updateUI();
        }

        createBoard();
        spawnResources(5);
        spawnEnemy();
        updateUI();
    </script>

</body>
</html>
